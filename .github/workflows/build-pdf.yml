name: build-pdf

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Setup Typst
        uses: typst-community/setup-typst@v5

      - name: Install Chromium for Playwright
        run: uv run --with playwright python -m playwright install --with-deps chromium

      - name: Build PDF
        run: uv run build_pdf.py --html input.html --output dist/input.pdf --keep-artifacts

      - name: Upload PDF artifact
        id: upload
        uses: actions/upload-artifact@v7
        with:
          path: dist/input.pdf
          archive: false
          if-no-files-found: error

      - name: Add PDF link to job summary
        run: |
          {
            echo "## PDF artifact"
            echo
            echo "- [Open PDF](${{ steps.upload.outputs.artifact-url }})"
            echo "- Artifact ID: \\`${{ steps.upload.outputs.artifact-id }}\\`"
          } >> "$GITHUB_STEP_SUMMARY"
